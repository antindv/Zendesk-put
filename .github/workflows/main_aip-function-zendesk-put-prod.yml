name: Build and deploy Python project to Azure Function App - ZendeskPut

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'      # chemin vers ton projet Functions (racine)
  PYTHON_VERSION: '3.12'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # (Optionnel) venv uniquement pour exécuter des tests; pas nécessaire pour le package
      - name: Install app dependencies into .python_packages
        run: |
          python -m pip install --upgrade pip
          pip install --target ".python_packages/lib/site-packages" -r requirements.txt

      # Important : zipper les FICHIERS du projet (et inclure .python_packages)
      - name: Create deployment package
        run: |
          # On zippe le contenu (host.json à la racine) et .python_packages
          zip -r release.zip * .python_packages

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip package
        run: |
          unzip release.zip
          rm release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D22EBD6EAD11448CA92FF9057DE9BDF0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EA089CE9AF0F4AB5AA067404A4F46BEA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1DEF23B0D3484089BC0004D87A2D2533 }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'aip-function-zendesk-put-prod'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

